spring.application.name=ai-resume-screener
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Database Configuration - PostgreSQL Only
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration - PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# SQL Init - Use Hibernate for schema creation
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data-postgresql.sql

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Application Configuration
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.jwt.secret=${APP_JWT_SECRET:ZmFrZS1zZWNyZXQta2VlcC10aGlzLWluLWVudi1maWxlLWFuZC1jaGFuZ2UtaXQ=}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.storage.upload-dir=${APP_STORAGE_UPLOAD_DIR:uploads}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
